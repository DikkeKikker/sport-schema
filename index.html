<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>Training</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #222;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0ede8;
  --muted: rgba(240,237,232,0.45);
  --accent: #c8f06e;
  --accent-dim: rgba(200,240,110,0.10);
  --accent-text: #0f0f0f;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --r: 10px;
  --col-a: #e8a87c;
  --col-b: #7cb8e8;
  --col-c: #b07ce8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;min-height:100vh;overscroll-behavior:none;}

.nav{display:flex;gap:0;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(15,15,15,0.97);backdrop-filter:blur(12px);z-index:100;padding-top:env(safe-area-inset-top);}
.nav-tab{flex:1;padding:14px 4px;text-align:center;font-size:12px;font-family:var(--mono);color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.04em;}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

.page{display:none;padding:20px 16px 100px;}
.page.active{display:block;}

.dash-title{font-size:22px;font-weight:300;letter-spacing:-.02em;margin-bottom:4px;}
.dash-sub{font-size:13px;color:var(--muted);font-family:var(--mono);margin-bottom:20px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.stat-val{font-size:28px;font-weight:300;letter-spacing:-.02em;color:var(--text);line-height:1;}
.stat-val span{font-size:14px;color:var(--muted);font-weight:400;}
.stat-label{font-size:11px;font-family:var(--mono);color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.06em;}
.streak-card{background:var(--accent-dim);border:1px solid rgba(200,240,110,0.18);border-radius:var(--r);padding:14px;}
.streak-card .stat-val{color:var(--accent);}

.section-head{font-size:11px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:20px 0 10px;display:flex;align-items:center;gap:8px;}
.section-head::after{content:'';flex:1;height:1px;background:var(--border);}

.heatmap{display:grid;grid-template-columns:repeat(52,1fr);gap:2px;margin-bottom:6px;overflow:hidden;}
.hm-cell{aspect-ratio:1;border-radius:2px;background:var(--surface2);}
.hm-cell.done1{background:rgba(200,240,110,0.3);}
.hm-cell.done2{background:rgba(200,240,110,0.6);}
.hm-cell.done3{background:var(--accent);}
.hm-labels{display:flex;justify-content:space-between;font-size:10px;font-family:var(--mono);color:var(--muted);}

.vol-chart{height:80px;display:flex;align-items:flex-end;gap:3px;margin-bottom:4px;}
.vol-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.vol-bar{width:100%;border-radius:3px 3px 0 0;background:rgba(200,240,110,0.3);min-height:2px;}
.vol-bar.current{background:var(--accent);}
.vol-bar-label{font-size:9px;font-family:var(--mono);color:var(--muted);}

.pr-list{display:flex;flex-direction:column;gap:6px;}
.pr-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.pr-name{font-size:13px;color:var(--text);}
.pr-val{font-size:14px;font-family:var(--mono);font-weight:500;color:var(--accent);}
.pr-date{font-size:11px;color:var(--muted);font-family:var(--mono);}

.session-header{margin-bottom:16px;}
.session-name{font-size:26px;font-weight:300;letter-spacing:-.02em;margin-bottom:4px;}
.session-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.badge{font-size:11px;font-family:var(--mono);font-weight:500;padding:3px 9px;border-radius:20px;letter-spacing:.05em;text-transform:uppercase;}
.badge-a{background:rgba(232,168,124,.15);color:var(--col-a);}
.badge-b{background:rgba(124,184,232,.15);color:var(--col-b);}
.badge-c{background:rgba(176,124,232,.15);color:var(--col-c);}
.session-time{font-size:12px;color:var(--muted);font-family:var(--mono);}

.mode-toggle{display:flex;gap:0;background:var(--surface2);border-radius:8px;padding:3px;margin-bottom:14px;border:1px solid var(--border);}
.mode-btn{flex:1;padding:7px;text-align:center;font-size:12px;font-family:var(--mono);color:var(--muted);cursor:pointer;border-radius:6px;transition:all .15s;letter-spacing:.03em;}
.mode-btn.active{background:var(--surface);color:var(--text);border:1px solid var(--border2);}

.vol-summary{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border-radius:8px;padding:10px 14px;margin-bottom:14px;border:1px solid var(--border);}
.vol-summary-label{font-size:12px;color:var(--muted);font-family:var(--mono);}
.vol-summary-val{font-size:15px;font-family:var(--mono);font-weight:500;color:var(--accent);}

.rounds-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;}
.rounds-label{font-size:13px;color:var(--muted);font-family:var(--mono);flex:1;}
.rounds-ctrl{display:flex;align-items:center;gap:10px;}
.round-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.round-btn:active{opacity:.6;}
.round-num{font-size:20px;font-family:var(--mono);font-weight:500;min-width:20px;text-align:center;}

.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;}
.ex-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;}
.ex-name{font-size:14px;font-weight:500;color:var(--text);flex:1;line-height:1.3;}
.ex-scheme{font-size:11px;font-family:var(--mono);color:var(--muted);background:var(--surface2);padding:3px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0;}

.circuit-input-row{display:flex;align-items:center;gap:10px;}
.circuit-input-wrap{position:relative;width:110px;}
.weight-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:18px;font-family:var(--mono);font-weight:500;padding:9px 32px 9px 12px;-webkit-appearance:none;appearance:none;transition:border-color .15s;}
.weight-input:focus{outline:none;border-color:var(--accent);background:rgba(200,240,110,.05);}
.weight-input::placeholder{color:rgba(240,237,232,.2);}
.unit{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--muted);font-family:var(--mono);pointer-events:none;}
.vol-inline{font-size:12px;color:var(--muted);font-family:var(--mono);}
.no-weight{font-size:13px;color:var(--muted);font-family:var(--mono);padding:2px 0;}

.sets-row{display:flex;gap:6px;flex-wrap:wrap;}
.set-block{flex:1;min-width:58px;max-width:82px;}
.set-num{font-size:10px;font-family:var(--mono);color:var(--muted);margin-bottom:4px;letter-spacing:.05em;text-transform:uppercase;}
.set-input-wrap{position:relative;}
.set-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:16px;font-family:var(--mono);font-weight:500;padding:9px 26px 9px 8px;-webkit-appearance:none;appearance:none;text-align:center;transition:border-color .15s;}
.set-input:focus{outline:none;border-color:var(--accent);background:rgba(200,240,110,.05);}
.set-input::placeholder{color:rgba(240,237,232,.2);}
.set-unit{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--muted);font-family:var(--mono);pointer-events:none;}

.note-input{width:100%;background:transparent;border:none;border-top:1px solid var(--border);color:var(--muted);font-family:var(--font);font-size:13px;padding:8px 0 2px;resize:none;line-height:1.4;min-height:28px;margin-top:10px;}
.note-input:focus{outline:none;color:var(--text);}
.note-input::placeholder{color:rgba(240,237,232,.18);}

.tip-card{margin-top:12px;background:var(--accent-dim);border:1px solid rgba(200,240,110,.15);border-radius:var(--r);padding:12px 14px;font-size:13px;color:rgba(200,240,110,.85);line-height:1.5;}

.divider{font-size:10px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:14px 0 10px;display:flex;align-items:center;gap:8px;}
.divider::after{content:'';flex:1;height:1px;background:var(--border);}

.save-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));background:rgba(15,15,15,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);z-index:200;display:flex;gap:8px;}
.save-btn{flex:1;padding:13px;background:var(--accent);color:var(--accent-text);font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;border:none;border-radius:10px;cursor:pointer;-webkit-appearance:none;}
.save-btn:active{opacity:.75;}
.save-btn.saved{background:var(--surface2);color:var(--accent);border:1px solid rgba(200,240,110,.3);}
.clear-btn{padding:13px 14px;background:var(--surface2);color:var(--muted);font-family:var(--mono);font-size:12px;border:1px solid var(--border);border-radius:10px;cursor:pointer;-webkit-appearance:none;}
.clear-btn:active{opacity:.6;}
</style>
</head>
<body>

<nav class="nav" id="nav"></nav>
<div class="page active" id="page-dash">
  <p class="dash-title">Voortgang</p>
  <p class="dash-sub" id="dash-sub">—</p>
  <div class="stat-grid">
    <div class="streak-card"><div class="stat-val" id="stat-streak">0 <span>wkn</span></div><div class="stat-label">Huidige streak</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-total">0</div><div class="stat-label">Sessies dit jaar</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-compl">0<span>%</span></div><div class="stat-label">Voltooiingsrate</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-vol">0 <span>kg</span></div><div class="stat-label">Volume deze week</div></div>
  </div>
  <div class="section-head">Activiteit dit jaar</div>
  <div class="heatmap" id="heatmap"></div>
  <div class="hm-labels"><span>Jan</span><span>Apr</span><span>Jul</span><span>Okt</span><span>Dec</span></div>
  <div class="section-head">Volume per week (kg)</div>
  <div class="vol-chart" id="vol-chart"></div>
  <div class="section-head">Persoonlijke records</div>
  <div class="pr-list" id="pr-list"></div>
</div>
<div class="page" id="page-wo"></div>
<div class="page" id="page-za"></div>
<div class="page" id="page-zo"></div>
<div class="save-bar" id="save-bar" style="display:none;">
  <button class="save-btn" id="save-btn" onclick="saveSession()">Opslaan</button>
  <button class="clear-btn" onclick="clearSession()">Wis</button>
</div>

<script>
const SESSIONS=[
  {id:'wo',label:'Wo',pageId:'page-wo',name:'Circuit A',type:'circuit',badge:'badge-a',typeName:'Woensdag',time:'~40 min',rounds:4,
   tip:'Solide basisdag. Focus op techniek bij de RDL en een gecontroleerde neergaande fase bij de pike push-up.',
   exercises:[
    {id:'goblet',name:'Goblet squat',scheme:'45s / 15s rust',noweight:false,sets:4,reps:'12'},
    {id:'rdl',name:'Romanian deadlift',scheme:'45s / 15s rust',noweight:false,sets:4,reps:'10'},
    {id:'pike_pu',name:'Pike push-up',scheme:'45s / 15s rust',noweight:false,sets:4,reps:'max'},
    {id:'trx_row',name:'TRX inverted row',scheme:'45s / 15s rust',noweight:false,sets:4,reps:'max'},
    {id:'db_fly',name:'Dumbbell fly',scheme:'45s / 15s rust',noweight:false,sets:4,reps:'12'},
    {id:'dead_bug',name:'Dead bug',scheme:'45s / 15s rust',noweight:true,sets:4,reps:'max'},
  ]},
  {id:'za',label:'Za',pageId:'page-za',name:'Circuit B',type:'circuit',badge:'badge-b',typeName:'Zaterdag',time:'~40 min',rounds:4,
   tip:'Zwaarste dag. Bulgarian split squat en single-leg deadlift vragen balans — neem rustig de tijd voor je eerste ronde.',
   exercises:[
    {id:'bss',name:'Bulgarian split squat',scheme:'45s / 15s rust',noweight:false,sets:4,reps:'10 p.z.'},
    {id:'sl_rdl',name:'Single-leg deadlift',scheme:'45s / 15s rust',noweight:false,sets:4,reps:'10 p.z.'},
    {id:'dips',name:'Dips',scheme:'45s / 15s rust',noweight:false,sets:4,reps:'max'},
    {id:'pullup',name:'Pull-up',scheme:'45s / 15s rust',noweight:false,sets:4,reps:'max'},
    {id:'pallof',name:'TRX pallof press',scheme:'45s / 15s rust',noweight:true,sets:4,reps:'12 p.z.'},
    {id:'hang_knee',name:'Hanging knee raise',scheme:'45s / 15s rust',noweight:true,sets:4,reps:'max'},
  ]},
  {id:'zo',label:'Zo',pageId:'page-zo',name:'Circuit C',type:'circuit',badge:'badge-c',typeName:'Zondag',time:'~40 min',rounds:4,
   tip:'TRX-georiënteerde dag. Meer instabiliteit door alle oefeningen — focus op core-spanning gedurende de hele ronde.',
   exercises:[
    {id:'sl_glutebridge',name:'Single-leg glute bridge',scheme:'45s / 15s rust',noweight:false,sets:4,reps:'15'},
    {id:'step_up',name:'Step-up',scheme:'45s / 15s rust',noweight:false,sets:4,reps:'12 p.z.'},
    {id:'trx_atomic',name:'TRX atomic push-up',scheme:'45s / 15s rust',noweight:false,sets:4,reps:'max'},
    {id:'trx_face',name:'TRX face pull',scheme:'45s / 15s rust',noweight:false,sets:4,reps:'15'},
    {id:'db_press',name:'Dumbbell press',scheme:'45s / 15s rust',noweight:false,sets:4,reps:'12'},
    {id:'cph_plank',name:'Copenhagen plank',scheme:'45s / 15s rust',noweight:true,sets:4,reps:'30s p.z.'},
  ]},
];

const MONTHS=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];

function ls(k){try{return localStorage.getItem(k)||'';}catch(e){return '';}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function lsDel(k){try{localStorage.removeItem(k);}catch(e){}}
function lsKeys(prefix){try{const r=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(prefix))r.push(k);}return r;}catch(e){return[];}}

function isoDate(d){return d.toISOString().slice(0,10);}
function todayStr(){return isoDate(new Date());}
function weekNum(dateStr){const d=new Date(dateStr);const j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7);}
function weekKey(dateStr){const d=new Date(dateStr);return `${d.getFullYear()}-${String(weekNum(dateStr)).padStart(2,'0')}`;}

function sessionVolume(sid){
  const s=SESSIONS.find(x=>x.id===sid);if(!s)return 0;
  const mode=ls(`mode_${sid}`)||'circuit';
  let total=0;
  if(mode==='circuit'){
    const rounds=parseInt(ls(`rounds_${sid}`)||s.rounds);
    for(const ex of s.exercises){if(ex.noweight)continue;const w=parseFloat(ls(`cw_${sid}_${ex.id}`)||0);total+=w*rounds;}
  }else{
    for(const ex of s.exercises){if(ex.noweight)continue;for(let i=0;i<ex.sets;i++){total+=parseFloat(ls(`sw_${sid}_${ex.id}_${i}`)||0);}}
  }
  return Math.round(total);
}

function logSession(sid){
  lsSet(`log_${todayStr()}_${sid}`,'1');
  updatePRs(sid);
}

function updatePRs(sid){
  const s=SESSIONS.find(x=>x.id===sid);if(!s)return;
  const mode=ls(`mode_${sid}`)||'circuit';
  for(const ex of s.exercises){
    if(ex.noweight)continue;
    let maxW=0;
    if(mode==='circuit'){maxW=parseFloat(ls(`cw_${sid}_${ex.id}`)||0);}
    else{for(let i=0;i<ex.sets;i++){const w=parseFloat(ls(`sw_${sid}_${ex.id}_${i}`)||0);if(w>maxW)maxW=w;}}
    if(maxW>0){
      const prev=parseFloat(ls(`pr_${ex.id}`)||0);
      if(maxW>prev){lsSet(`pr_${ex.id}`,String(maxW));lsSet(`pr_date_${ex.id}`,todayStr());}
    }
  }
}

function buildDashboard(){
  const now=new Date();
  document.getElementById('dash-sub').textContent=`${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
  const yearLogs=lsKeys(`log_${now.getFullYear()}`);
  document.getElementById('stat-total').textContent=yearLogs.length;

  // Streak
  let streak=0;
  const tmp=new Date();
  for(let w=0;w<52;w++){
    const wk=weekKey(isoDate(tmp));
    const has=yearLogs.some(k=>{const ds=k.slice(4,14);return weekKey(ds)===wk;});
    if(has)streak++;else if(w>0)break;
    tmp.setDate(tmp.getDate()-7);
  }
  document.getElementById('stat-streak').innerHTML=`${streak} <span>wkn</span>`;

  // Completion: % of this week's 3 sessions saved
  const cwk=weekKey(todayStr());
  const thisWeekLogs=yearLogs.filter(k=>weekKey(k.slice(4,14))===cwk);
  const uniqueSessions=new Set(thisWeekLogs.map(k=>k.split('_').pop())).size;
  const rate=Math.round((uniqueSessions/3)*100);
  document.getElementById('stat-compl').innerHTML=`${rate}<span>%</span>`;

  // Volume this week
  let wvol=0;for(const s of SESSIONS)wvol+=sessionVolume(s.id);
  document.getElementById('stat-vol').innerHTML=`${wvol} <span>kg</span>`;

  // Heatmap
  const hm=document.getElementById('heatmap');hm.innerHTML='';
  const start=new Date(now.getFullYear(),0,1);
  for(let w=0;w<52;w++){
    const wd=new Date(start);wd.setDate(start.getDate()+w*7);
    const wk=weekKey(isoDate(wd));
    const cnt=yearLogs.filter(k=>weekKey(k.slice(4,14))===wk).length;
    const cls=cnt>=3?'done3':cnt>=2?'done2':cnt>=1?'done1':'';
    hm.innerHTML+=`<div class="hm-cell ${cls}"></div>`;
  }

  // Volume chart 8 weeks
  const chart=document.getElementById('vol-chart');chart.innerHTML='';
  const wvols=[];
  for(let w=7;w>=0;w--){
    const wd=new Date();wd.setDate(wd.getDate()-w*7);
    const wk=weekKey(isoDate(wd));
    const wlogs=yearLogs.filter(k=>weekKey(k.slice(4,14))===wk);
    let vol=0;
    for(const logKey of wlogs){const sid=logKey.split('_').pop();vol+=sessionVolume(sid);}
    wvols.push({vol,current:w===0});
  }
  const maxV=Math.max(...wvols.map(x=>x.vol),1);
  for(const wv of wvols){
    const pct=Math.round((wv.vol/maxV)*100);
    chart.innerHTML+=`<div class="vol-bar-wrap"><div class="vol-bar${wv.current?' current':''}" style="height:${Math.max(pct,2)}%"></div><div class="vol-bar-label">${wv.vol>0?wv.vol:''}</div></div>`;
  }

  // PRs
  const prList=document.getElementById('pr-list');
  const allEx=SESSIONS.flatMap(s=>s.exercises.filter(e=>!e.noweight));
  const prs=allEx.map(ex=>{const w=parseFloat(ls(`pr_${ex.id}`)||0);const dt=ls(`pr_date_${ex.id}`);return{name:ex.name,w,dt};}).filter(x=>x.w>0).sort((a,b)=>b.w-a.w);
  if(!prs.length){prList.innerHTML='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Log je eerste training om PR\'s bij te houden.</div>';}
  else{prList.innerHTML=prs.map(p=>{const d=p.dt?new Date(p.dt):null;const ds=d?`${d.getDate()} ${MONTHS[d.getMonth()]}`:'-';return`<div class="pr-row"><div><div class="pr-name">${p.name}</div><div class="pr-date">${ds}</div></div><div class="pr-val">${p.w} kg</div></div>`;}).join('');}
}

function buildSessionPage(s){
  const page=document.getElementById(s.pageId);
  const mode=ls(`mode_${s.id}`)||'circuit';
  const rounds=parseInt(ls(`rounds_${s.id}`)||s.rounds);
  const vol=sessionVolume(s.id);

  let html=`<div class="session-header"><div class="session-name">${s.name}</div><div class="session-meta"><span class="badge ${s.badge}">${s.typeName}</span><span class="session-time">${s.time}</span></div></div>`;
  html+=`<div class="mode-toggle"><div class="mode-btn ${mode==='circuit'?'active':''}" onclick="setMode('${s.id}','circuit')">Circuit</div><div class="mode-btn ${mode==='straight'?'active':''}" onclick="setMode('${s.id}','straight')">Straight sets</div></div>`;
  html+=`<div class="vol-summary"><span class="vol-summary-label">Totaal volume sessie</span><span class="vol-summary-val" id="vol_${s.id}">${vol} kg</span></div>`;

  if(mode==='circuit'){
    html+=`<div class="rounds-row"><span class="rounds-label">Rondes</span><div class="rounds-ctrl"><div class="round-btn" onclick="changeRounds('${s.id}',-1)">−</div><div class="round-num" id="rd_${s.id}">${rounds}</div><div class="round-btn" onclick="changeRounds('${s.id}',1)">+</div></div></div>`;
    html+=`<div class="divider">Oefeningen — 1 gewicht voor alle rondes</div>`;
    for(const ex of s.exercises){
      const w=ls(`cw_${s.id}_${ex.id}`);
      const exVol=w&&rounds?Math.round(parseFloat(w)*rounds):0;
      html+=`<div class="ex-card"><div class="ex-top"><div class="ex-name">${ex.name}</div><div class="ex-scheme">${ex.scheme}</div></div>`;
      if(ex.noweight){html+=`<div class="no-weight">— geen gewicht</div>`;}
      else{html+=`<div class="circuit-input-row"><div class="circuit-input-wrap"><input class="weight-input" type="number" inputmode="decimal" min="0" step="0.5" placeholder="—" value="${w}" id="cw_${s.id}_${ex.id}" oninput="updateCircuitVol('${s.id}')"/><span class="unit">kg</span></div><span class="vol-inline" id="exvol_${s.id}_${ex.id}">${exVol>0?'× '+rounds+' = '+exVol+' kg':''}</span></div>`;}
      const note=ls(`note_${s.id}_${ex.id}`);
      html+=`<textarea class="note-input" rows="1" placeholder="Notitie..." id="note_${s.id}_${ex.id}" oninput="autoResize(this)">${note}</textarea></div>`;
    }
  } else {
    html+=`<div class="divider">Straight sets — alle sets per oefening</div>`;
    for(const ex of s.exercises){
      html+=`<div class="ex-card"><div class="ex-top"><div class="ex-name">${ex.name}</div><div class="ex-scheme">${ex.sets}×${ex.reps}</div></div>`;
      if(ex.noweight){html+=`<div class="no-weight">— geen gewicht</div>`;}
      else{
        html+=`<div class="sets-row">`;
        for(let i=0;i<ex.sets;i++){const v=ls(`sw_${s.id}_${ex.id}_${i}`);html+=`<div class="set-block"><div class="set-num">Set ${i+1}</div><div class="set-input-wrap"><input class="set-input" type="number" inputmode="decimal" min="0" step="0.5" placeholder="—" value="${v}" id="sw_${s.id}_${ex.id}_${i}" oninput="updateStraightVol('${s.id}')"/><span class="set-unit">kg</span></div></div>`;}
        html+=`</div>`;
      }
      const note=ls(`note_${s.id}_${ex.id}`);
      html+=`<textarea class="note-input" rows="1" placeholder="Notitie..." id="note_${s.id}_${ex.id}" oninput="autoResize(this)">${note}</textarea></div>`;
    }
  }
  html+=`<div class="tip-card">${s.tip}</div>`;
  page.innerHTML=html;
  document.querySelectorAll('.note-input').forEach(autoResize);
}

function setMode(sid,mode){lsSet(`mode_${sid}`,mode);const s=SESSIONS.find(x=>x.id===sid);buildSessionPage(s);}

function changeRounds(sid,delta){
  const s=SESSIONS.find(x=>x.id===sid);
  const cur=parseInt(ls(`rounds_${sid}`)||s.rounds);
  const next=Math.max(1,Math.min(10,cur+delta));
  lsSet(`rounds_${sid}`,String(next));
  const el=document.getElementById(`rd_${sid}`);if(el)el.textContent=next;
  updateCircuitVol(sid);
}

function updateCircuitVol(sid){
  const s=SESSIONS.find(x=>x.id===sid);
  const rounds=parseInt(ls(`rounds_${sid}`)||s.rounds);
  let total=0;
  for(const ex of s.exercises){
    if(ex.noweight)continue;
    const el=document.getElementById(`cw_${sid}_${ex.id}`);
    const w=el?parseFloat(el.value||0):0;
    const vol=Math.round(w*rounds);total+=vol;
    const ve=document.getElementById(`exvol_${sid}_${ex.id}`);
    if(ve)ve.textContent=w>0?`× ${rounds} = ${vol} kg`:'';
  }
  const ve=document.getElementById(`vol_${sid}`);if(ve)ve.textContent=`${total} kg`;
}

function updateStraightVol(sid){
  const s=SESSIONS.find(x=>x.id===sid);
  let total=0;
  for(const ex of s.exercises){if(ex.noweight)continue;for(let i=0;i<ex.sets;i++){const el=document.getElementById(`sw_${sid}_${ex.id}_${i}`);total+=el?parseFloat(el.value||0):0;}}
  const ve=document.getElementById(`vol_${sid}`);if(ve)ve.textContent=`${Math.round(total)} kg`;
}

function autoResize(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}

function saveSession(){
  const sid=activePageId.replace('page-','');
  const s=SESSIONS.find(x=>x.id===sid);if(!s)return;
  const mode=ls(`mode_${sid}`)||'circuit';
  if(mode==='circuit'){
    const rEl=document.getElementById(`rd_${sid}`);if(rEl)lsSet(`rounds_${sid}`,rEl.textContent);
    for(const ex of s.exercises){
      const el=document.getElementById(`cw_${sid}_${ex.id}`);if(el)lsSet(`cw_${sid}_${ex.id}`,el.value);
      const nel=document.getElementById(`note_${sid}_${ex.id}`);if(nel)lsSet(`note_${sid}_${ex.id}`,nel.value);
    }
  }else{
    for(const ex of s.exercises){
      for(let i=0;i<ex.sets;i++){const el=document.getElementById(`sw_${sid}_${ex.id}_${i}`);if(el)lsSet(`sw_${sid}_${ex.id}_${i}`,el.value);}
      const nel=document.getElementById(`note_${sid}_${ex.id}`);if(nel)lsSet(`note_${sid}_${ex.id}`,nel.value);
    }
  }
  logSession(sid);
  const btn=document.getElementById('save-btn');
  btn.textContent='Opgeslagen ✓';btn.classList.add('saved');
  setTimeout(()=>{btn.textContent='Opslaan';btn.classList.remove('saved');},2200);
}

function clearSession(){
  const sid=activePageId.replace('page-','');
  const s=SESSIONS.find(x=>x.id===sid);
  if(!s||!confirm('Gewichten van deze sessie wissen?'))return;
  for(const ex of s.exercises){
    lsDel(`cw_${sid}_${ex.id}`);
    for(let i=0;i<ex.sets;i++)lsDel(`sw_${sid}_${ex.id}_${i}`);
    lsDel(`note_${sid}_${ex.id}`);
  }
  buildSessionPage(s);
}

let activePageId='page-dash';
function buildNav(){
  const tabs=[{id:'page-dash',label:'Overview'},...SESSIONS.map(s=>({id:s.pageId,label:s.label}))];
  document.getElementById('nav').innerHTML=tabs.map(t=>`<div class="nav-tab ${t.id===activePageId?'active':''}" onclick="switchPage('${t.id}')">${t.label}</div>`).join('');
}

function switchPage(pageId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  activePageId=pageId;buildNav();
  const sb=document.getElementById('save-bar');
  if(pageId==='page-dash'){sb.style.display='none';buildDashboard();}
  else{
    sb.style.display='flex';
    const sid=pageId.replace('page-','');
    buildSessionPage(SESSIONS.find(x=>x.id===sid));
    const btn=document.getElementById('save-btn');btn.textContent='Opslaan';btn.classList.remove('saved');
  }
  window.scrollTo(0,0);
}

buildNav();buildDashboard();
const dayMap={3:'page-wo',6:'page-za',0:'page-zo'};
const tp=dayMap[new Date().getDay()];
if(tp)switchPage(tp);
</script>
